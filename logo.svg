  <circle cx="32" cy="6" r="2.6" fill="#ffb347"/>
  <!-- tuning dial -->
  <circle cx="44" cy="37" r="9" fill="none" stroke="url(#g)" stroke-width="3"/>
  <line x1="44" y1="37" x2="44" y2="30" stroke="#ffb347" stroke-width="3" stroke-linecap="round"/>
  <!-- signal bars -->
  <rect x="15" y="40" width="4" height="7"  rx="1.5" fill="url(#g)"/>
  <rect x="22" y="35" width="4" height="12" rx="1.5" fill="url(#g)"/>
  <rect x="29" y="30" width="4" height="17" rx="1.5" fill="url(#g)"/>
</svg>
